<!DOCTYPE html>
<html>
<head>
  <title>K8s Demo App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      font-size: 20px;
      color: green;
    }
  </style>
</head>

<body>

  <h1>Frontend 🚀</h1>

  <button onclick="callApi()">Call Backend</button>

  <p id="output">Response will appear here...</p>

  <script>
    function callApi() {
      fetch('http://localhost:3001/api')
        .then(response => response.json())
        .then(data => {
          document.getElementById('output').innerText = data.message;
        })
        .catch(error => {
          document.getElementById('output').innerText = "Error calling backend ❌";
          console.error(error);
        });
    }
  </script>

</body>
</html>
