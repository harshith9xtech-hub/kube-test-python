<!DOCTYPE html>
<html>
<head>
  <title>K8s Demo</title>
</head>
<body>
  <h1>Frontend 🚀</h1>

  <button onclick="callApi()">Call Backend</button>
  <p id="output"></p>

  <script>
    // CHANGE THIS BASE URL WHEN NEEDED
    const API_BASE = "http://localhost:3001";

    function callApi() {
      fetch(`${API_BASE}/api`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("output").innerText = data.message;
        })
        .catch(err => {
          document.getElementById("output").innerText = "Error calling API";
          console.error(err);
        });
    }
  </script>
</body>
</html>
